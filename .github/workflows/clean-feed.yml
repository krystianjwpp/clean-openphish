name: Fetch and Clean OpenPhish Feed

on:
  schedule:
    - cron: '0 0 * * *' # This runs the script automatically every day at midnight
  workflow_dispatch: # This allows you to run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download and Clean OpenPhish Feed
      run: |
        # 1. Download the free community OpenPhish text feed
        curl -s https://openphish.com -o raw_list.txt
        
        # 2. Clean it by removing http:// and https:// prefixes
        sed -e 's~http://~~g' -e 's~https://~~g' raw_list.txt > edl-list.txt
        
        # 3. Clean up temporary files
        rm raw_list.txt

    - name: Commit and Push Cleaned List
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add edl-list.txt
        git commit -m "Automated update: Cleaned OpenPhish EDL" || exit 0
        git push
