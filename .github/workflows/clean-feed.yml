name: Fetch and Clean OpenPhish Feed

on:
  schedule:
    - cron: '0 0 * * *' # This runs automatically every day at midnight
  workflow_dispatch: # This allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download and Clean OpenPhish Feed
      run: |
        # Download the plain text community feed via raw source mirror
        curl -s "https://githubusercontent.com" | grep -oE "https?://[a-zA-Z0-9./_-]+" > raw_list.txt || curl -s https://openphish.com/feed.txt -o raw_list.txt
        
        # Clean it by removing http:// and https:// prefixes
        sed -e 's~http://~~g' -e 's~https://~~g' raw_list.txt > edl-list.txt
        
        # Clean up temporary files
        rm -f raw_list.txt

    - name: Commit and Push Cleaned List
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add edl-list.txt
        git commit -m "Automated update: Cleaned OpenPhish EDL" || exit 0
        git push
